<!doctype html>
<html lang="zh-CN">
  <head>
    <meta name="app-version" content="2.0.3" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>2048 Lite</title>
    <style>
:root {
  --bg: #f6f6f4;
  --board-bg: #efefed;
  --tile-bg: #e2e1de;
  --text: #222;
  --muted: #7a7a78;
  --accent: #222;
  --gap: 10px;
  --radius: 10px;
  --tile-size: 72px;
  --anim: 120ms;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: ui-monospace, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

#app {
  width: min(92vw, 520px);
}

.view {
  width: 100%;
}

.hidden {
  display: none !important;
}

.entry-card {
  background: #fff;
  border-radius: 16px;
  padding: 28px;
  border: 1px solid #e6e6e3;
}

.title {
  font-size: 40px;
  letter-spacing: 4px;
  margin-bottom: 20px;
}

.entry-record {
  display: grid;
  gap: 12px;
  margin-bottom: 18px;
  color: var(--muted);
  font-size: 14px;
}

.record-row {
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid #ededeb;
  padding-bottom: 6px;
}

.entry-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}

.entry-hint {
  font-size: 12px;
  color: var(--muted);
}

.btn {
  border: 1px solid #d7d7d2;
  background: #fff;
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
  transition: background 120ms ease, transform 120ms ease;
}

.btn:hover {
  background: #f1f1ee;
}

.btn:active {
  transform: translateY(1px);
}

.btn.primary {
  background: #1f1f1f;
  color: #fff;
  border-color: #1f1f1f;
}

.btn.ghost {
  background: #fff;
}

.btn.active {
  background: #1f1f1f;
  color: #fff;
  border-color: #1f1f1f;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  gap: 8px;
}

.brand {
  font-size: 18px;
  font-weight: 600;
}

.scoreboard {
  display: flex;
  gap: 8px;
  margin-left: auto;
}

.score-panel {
  min-width: 82px;
  padding: 8px 10px 7px;
  border-radius: 10px;
  background: #bbada0;
  color: #f9f6f2;
  text-align: center;
  line-height: 1.1;
}

.score-label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: #eee4da;
  text-transform: uppercase;
}

.score-value {
  display: block;
  margin-top: 4px;
  font-size: 22px;
  font-weight: 700;
}

.actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.bot-controls {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.btn.bot-step {
  min-width: 34px;
  padding-inline: 0;
}

.bot-speed {
  min-width: 58px;
  padding: 0 6px;
  font-size: 12px;
  color: var(--muted);
  text-align: center;
}

.board-wrap {
  position: relative;
}

.board {
  background: var(--board-bg);
  border-radius: 14px;
  padding: var(--gap);
  display: grid;
  grid-template-columns: repeat(4, var(--tile-size));
  grid-template-rows: repeat(4, var(--tile-size));
  gap: var(--gap);
  touch-action: none;
  position: relative;
}

.cell {
  width: var(--tile-size);
  height: var(--tile-size);
  background: #f2f2ef;
  border-radius: var(--radius);
}

.tile {
  position: absolute;
  width: var(--tile-size);
  height: var(--tile-size);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 20px;
  color: #1d1d1d;
  transform: translate3d(var(--x, 0), var(--y, 0), 0) scale(1);
  transition: transform var(--anim) ease;
  will-change: transform;
}

.tile.no-anim {
  transition: none;
}

.tile.new {
  transform: translate3d(var(--x, 0), var(--y, 0), 0) scale(1);
}

.tile.merge {
  transform: translate3d(var(--x, 0), var(--y, 0), 0) scale(1.08);
}

.tile .exp {
  font-size: 0.65em;
  vertical-align: super;
  letter-spacing: 0;
}

.overlay {
  position: absolute;
  inset: 0;
  background: rgba(255, 255, 255, 0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 14px;
}

.overlay-card {
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  border: 1px solid #e4e4e0;
  display: grid;
  gap: 12px;
  text-align: center;
}

.overlay-title {
  font-size: 18px;
}

.overlay-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
}

@media (max-width: 520px) {
  :root {
    --tile-size: 18vw;
    --tile-font: 4.2vw;
  }

  .topbar {
    flex-wrap: wrap;
    align-items: stretch;
  }

  .scoreboard {
    width: 100%;
    margin-left: 0;
  }

  .score-panel {
    flex: 1 1 0;
  }
}

</style>
  </head>
  <body>
    <div id="app">
      <section id="entry" class="view">
        <div class="entry-card">
          <h1 class="title">2048</h1>
          <div class="entry-record" id="entry-record">
            <div class="record-row"><span>最高分</span><span id="record-score">--</span></div>
            <div class="record-row"><span>用时</span><span id="record-time">--</span></div>
            <div class="record-row"><span>时间</span><span id="record-date">--</span></div>
          </div>
          <div class="entry-actions">
            <button id="btn-start" class="btn primary">开始</button>
            <button id="btn-continue" class="btn ghost">继续</button>
          </div>
          <p class="entry-hint">滑动或使用 WASD / 方向键</p>
        </div>
      </section>

      <section id="game" class="view hidden">
        <header class="topbar">
          <div class="brand">2048</div>
          <div class="scoreboard">
            <div class="score-panel">
              <span class="score-label">分数</span>
              <span class="score-value" id="score">0</span>
            </div>
            <div class="score-panel">
              <span class="score-label">最高分</span>
              <span class="score-value" id="best-score">0</span>
            </div>
          </div>
          <div class="actions">
            <div class="bot-controls">
              <button id="btn-bot-slower" class="btn ghost bot-step" aria-label="降低托管速度">-</button>
              <button id="btn-bot" class="btn ghost">托管</button>
              <button id="btn-bot-faster" class="btn ghost bot-step" aria-label="提高托管速度">+</button>
              <span id="bot-speed" class="bot-speed">180ms</span>
            </div>
            <button id="btn-undo" class="btn ghost">撤回</button>
            <button id="btn-restart" class="btn ghost">重开</button>
            <button id="btn-back" class="btn ghost">入口</button>
          </div>
        </header>

        <main class="board-wrap">
          <div id="board" class="board" aria-label="2048 board"></div>
        </main>

        <div id="game-over" class="overlay hidden">
          <div class="overlay-card">
            <div class="overlay-title">游戏结束</div>
            <div class="overlay-actions">
              <button id="btn-over-restart" class="btn primary">再来一局</button>
              <button id="btn-over-board" class="btn ghost">返回棋盘</button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script>
(function(){

// src/board.js
const SIZE = 4;

function createEmptyState() {
  return {
    size: SIZE,
    boardCells: Array(SIZE * SIZE).fill(null),
    tiles: new Map(),
    nextTileId: 1,
    score: 0,
    startTime: 0,
    elapsedMs: 0,
    bestRecord: null,
    isGameOver: false,
    isAnimating: false,
    undoStack: [],
  };
}

function createTile(state, cell, value) {
  const tile = {
    id: state.nextTileId++,
    value,
    cell,
    prevCell: null,
    mergedFrom: null,
    isNew: false,
  };
  state.tiles.set(tile.id, tile);
  state.boardCells[cell] = tile.id;
  return tile;
}

function restoreFromSave(state, saved) {
  state.size = saved.size || SIZE;
  state.boardCells = Array(state.size * state.size).fill(null);
  state.tiles = new Map();
  let maxTileId = 0;
  (saved.tiles || []).forEach((t) => {
    if (!t || typeof t.id !== "number" || typeof t.value !== "number" || typeof t.cell !== "number") {
      return;
    }
    if (t.cell < 0 || t.cell >= state.boardCells.length) return;
    if (state.boardCells[t.cell] !== null) return;
    state.tiles.set(t.id, {
      id: t.id,
      value: t.value,
      cell: t.cell,
      prevCell: null,
      mergedFrom: null,
      isNew: false,
    });
    state.boardCells[t.cell] = t.id;
    if (t.id > maxTileId) maxTileId = t.id;
  });
  state.nextTileId = Math.max(saved.nextTileId || 1, maxTileId + 1);
  state.score = saved.score || 0;
  state.elapsedMs = saved.elapsedMs || 0;
  state.startTime = saved.startTime || 0;
  state.isGameOver = false;
  state.isAnimating = false;
  state.undoStack = [];
}

function addRandomTile(state) {
  const empties = [];
  for (let i = 0; i < state.boardCells.length; i += 1) {
    if (state.boardCells[i] === null) empties.push(i);
  }
  if (empties.length === 0) return null;
  const cell = empties[Math.floor(Math.random() * empties.length)];
  const value = Math.random() < 0.9 ? 2 : 4;
  const tile = createTile(state, cell, value);
  tile.isNew = true;
  return tile;
}

function getCell(row, col) {
  return row * SIZE + col;
}

function getLines(dir) {
  const lines = [];
  if (dir === "left" || dir === "right") {
    for (let r = 0; r < SIZE; r += 1) {
      const line = [];
      for (let c = 0; c < SIZE; c += 1) {
        const col = dir === "right" ? SIZE - 1 - c : c;
        line.push(getCell(r, col));
      }
      lines.push(line);
    }
  } else {
    for (let c = 0; c < SIZE; c += 1) {
      const line = [];
      for (let r = 0; r < SIZE; r += 1) {
        const row = dir === "down" ? SIZE - 1 - r : r;
        line.push(getCell(row, c));
      }
      lines.push(line);
    }
  }
  return lines;
}

function moveTiles(state, dir) {
  const lines = getLines(dir);
  let moved = false;
  let scoreGain = 0;
  const mergedOutIds = new Set();
  const mergedTo = new Map();

  state.tiles.forEach((tile) => {
    tile.prevCell = tile.cell;
    tile.mergedFrom = null;
    tile.isNew = false;
    tile.isMergedOut = false;
  });

  const newBoard = Array(SIZE * SIZE).fill(null);

  lines.forEach((line) => {
    const ids = line.map((idx) => state.boardCells[idx]).filter((id) => id !== null);
    const result = [];
    for (let i = 0; i < ids.length; i += 1) {
      const id = ids[i];
      const tile = state.tiles.get(id);
      if (tile === undefined) continue;
      const nextId = ids[i + 1];
      if (nextId !== undefined) {
        const nextTile = state.tiles.get(nextId);
        if (nextTile && nextTile.value === tile.value) {
          const base = tile.value;
          tile.value = base * 2;
          tile.mergedFrom = [id, nextId];
          nextTile.isMergedOut = true;
          mergedOutIds.add(nextId);
          mergedTo.set(nextId, id);
          scoreGain += tile.value;
          result.push(id);
          i += 1;
          continue;
        }
      }
      result.push(id);
    }

    result.forEach((id, index) => {
      const cell = line[index];
      const tile = state.tiles.get(id);
      if (!tile) return;
      tile.cell = cell;
      if (tile.prevCell !== tile.cell) moved = true;
      if (tile.mergedFrom) moved = true;
      newBoard[cell] = id;
    });
  });

  mergedOutIds.forEach((id) => {
    const targetId = mergedTo.get(id);
    const targetTile = targetId ? state.tiles.get(targetId) : null;
    const tile = state.tiles.get(id);
    if (!tile || !targetTile) return;
    tile.cell = targetTile.cell;
  });

  state.boardCells = newBoard;
  state.score += scoreGain;

  return { moved, scoreGain };
}

function canMove(state) {
  if (state.boardCells.some((cell) => cell === null)) return true;
  for (let r = 0; r < SIZE; r += 1) {
    for (let c = 0; c < SIZE; c += 1) {
      const cell = getCell(r, c);
      const id = state.boardCells[cell];
      const tile = state.tiles.get(id);
      if (!tile) continue;
      const right = c + 1 < SIZE ? state.tiles.get(state.boardCells[getCell(r, c + 1)]) : null;
      const down = r + 1 < SIZE ? state.tiles.get(state.boardCells[getCell(r + 1, c)]) : null;
      if (right && right.value === tile.value) return true;
      if (down && down.value === tile.value) return true;
    }
  }
  return false;
}

function snapshotState(state) {
  return {
    boardCells: Array.from(state.boardCells),
    tiles: Array.from(state.tiles.values()).map((tile) => ({
      id: tile.id,
      value: tile.value,
      cell: tile.cell,
    })),
    score: state.score,
    elapsedMs: state.elapsedMs,
    startTime: state.startTime,
    nextTileId: state.nextTileId,
  };
}

function restoreSnapshot(state, snapshot) {
  state.boardCells = Array.from(snapshot.boardCells);
  state.tiles = new Map();
  snapshot.tiles.forEach((tile) => {
    state.tiles.set(tile.id, {
      id: tile.id,
      value: tile.value,
      cell: tile.cell,
      prevCell: null,
      mergedFrom: null,
      isNew: false,
    });
  });
  state.score = snapshot.score;
  state.elapsedMs = snapshot.elapsedMs;
  state.startTime = snapshot.startTime;
  state.nextTileId = snapshot.nextTileId;
  state.isGameOver = false;
}



// src/render.js


function createRenderer(boardEl, overlayEl) {
  const tileNodes = new Map();
  let cellPositions = [];
  let measuredBoardWidth = 0;
  let measuredTileSize = 72;

  const ensureCells = () => {
    const existing = boardEl.querySelectorAll(".cell");
    if (existing.length === SIZE * SIZE) return;
    boardEl.innerHTML = "";
    for (let i = 0; i < SIZE * SIZE; i += 1) {
      const cell = document.createElement("div");
      cell.className = "cell";
      boardEl.appendChild(cell);
    }
  };

  const measure = () => {
    const cells = Array.from(boardEl.querySelectorAll(".cell"));
    const boardRect = boardEl.getBoundingClientRect();
    if (boardRect.width === 0 || cells.length !== SIZE * SIZE) {
      cellPositions = [];
      measuredBoardWidth = 0;
      return false;
    }
    cellPositions = cells.map((cell) => {
      const rect = cell.getBoundingClientRect();
      return { x: rect.left - boardRect.left, y: rect.top - boardRect.top };
    });
    measuredTileSize = cells[0].getBoundingClientRect().width || measuredTileSize;
    measuredBoardWidth = boardRect.width;
    return true;
  };

  const ensureMeasured = () => {
    const boardRect = boardEl.getBoundingClientRect();
    const invalid =
      cellPositions.length !== SIZE * SIZE ||
      measuredBoardWidth === 0 ||
      Math.abs(boardRect.width - measuredBoardWidth) > 0.5;
    if (invalid) {
      measure();
    }
  };

  const getTranslate = (cellIndex) => {
    ensureMeasured();
    return cellPositions[cellIndex] || { x: 0, y: 0 };
  };

  const formatValue = (value) => {
    if (value < 100000) return { text: String(value), isPow: false };
    const exp = Math.round(Math.log2(value));
    return { text: `2^${exp}`, isPow: true, exp };
  };

  const CLASSIC_TILE_COLORS = new Map([
    [2, "#eee4da"],
    [4, "#ede0c8"],
    [8, "#f2b179"],
    [16, "#f59563"],
    [32, "#f67c5f"],
    [64, "#f65e3b"],
    [128, "#edcf72"],
    [256, "#edcc61"],
    [512, "#edc850"],
    [1024, "#edc53f"],
    [2048, "#edc22e"],
    [4096, "#3c3a32"],
    [8192, "#3a3830"],
  ]);

  const colorForValue = (value) => {
    if (CLASSIC_TILE_COLORS.has(value)) {
      return CLASSIC_TILE_COLORS.get(value);
    }
    if (value > 8192) {
      const exp = Math.round(Math.log2(value));
      const light = Math.max(18, 24 - (exp - 13) * 0.8);
      return `hsl(28, 10%, ${light}%)`;
    }
    return "#cdc1b4";
  };

  const textColorForValue = (value) => {
    if (value <= 4) return "#776e65";
    return "#f9f6f2";
  };

  const fontSizeForValue = (display) => {
    const base = Math.max(14, Math.min(34, measuredTileSize * 0.36));
    const len = display.isPow ? String(display.exp).length + 1 : display.text.length;
    if (len <= 2) return `${base}px`;
    if (len <= 3) return `${base * 0.88}px`;
    if (len <= 4) return `${base * 0.78}px`;
    return `${base * 0.68}px`;
  };

  const renderTiles = (state) => {
    const alive = new Set();
    state.tiles.forEach((tile) => {
      alive.add(tile.id);
      let node = tileNodes.get(tile.id);
      if (!node) {
        node = document.createElement("div");
        node.className = "tile";
        node.dataset.id = String(tile.id);
        boardEl.appendChild(node);
        tileNodes.set(tile.id, node);
      }
      const display = formatValue(tile.value);
      if (display.isPow) {
        node.innerHTML = `2<span class="exp">${display.exp}</span>`;
      } else {
        node.textContent = display.text;
      }
      node.style.background = colorForValue(tile.value);
      node.style.color = textColorForValue(tile.value);
      node.style.fontSize = fontSizeForValue(display);

      const { x, y } = getTranslate(tile.cell);
      node.style.setProperty("--x", `${x}px`);
      node.style.setProperty("--y", `${y}px`);

      node.classList.toggle("new", Boolean(tile.isNew));
      node.classList.toggle("no-anim", Boolean(tile.isNew));
      node.classList.toggle("merge", Boolean(tile.mergedFrom));
    });

    tileNodes.forEach((node, id) => {
      if (!alive.has(id)) {
        node.remove();
        tileNodes.delete(id);
      }
    });
  };

  const clearTransient = () => {
    tileNodes.forEach((node) => {
      node.classList.remove("new");
      node.classList.remove("merge");
      node.classList.remove("no-anim");
    });
  };

  const showGameOver = (show) => {
    if (!overlayEl) return;
    overlayEl.classList.toggle("hidden", !show);
  };

  ensureCells();
  measure();

  return {
    measure,
    render(state) {
      ensureMeasured();
      renderTiles(state);
      showGameOver(state.isGameOver);
    },
    clearTransient,
    showGameOver,
  };
}



// src/animation.js
let activeTimer = null;

function runAnimation(state, duration, onDone) {
  if (activeTimer) {
    clearTimeout(activeTimer);
    activeTimer = null;
  }
  state.isAnimating = true;
  activeTimer = setTimeout(() => {
    state.isAnimating = false;
    activeTimer = null;
    if (onDone) onDone();
  }, duration);
}

function cancelAnimation(state) {
  if (activeTimer) {
    clearTimeout(activeTimer);
    activeTimer = null;
  }
  state.isAnimating = false;
}



// src/timer.js
function startTimer(state) {
  state.startTime = Date.now();
}

function updateElapsed(state) {
  if (state.startTime === 0) return;
  state.elapsedMs = Date.now() - state.startTime;
}

function resetTimer(state) {
  state.startTime = Date.now();
  state.elapsedMs = 0;
}

function restoreTimer(state, elapsedMs) {
  state.elapsedMs = elapsedMs || 0;
  state.startTime = Date.now() - state.elapsedMs;
}

function formatDuration(ms) {
  const total = Math.max(0, Math.floor(ms / 1000));
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  const pad = (n) => String(n).padStart(2, "0");
  if (h > 0) return `${pad(h)}:${pad(m)}:${pad(s)}`;
  return `${pad(m)}:${pad(s)}`;
}



// src/storage.js
const KEY_BEST = "2048_best_record";
const KEY_GAME = "2048_current_game";

function loadBestRecord() {
  const raw = localStorage.getItem(KEY_BEST);
  if (raw === null) return null;
  try {
    return JSON.parse(raw);
  } catch {
    return null;
  }
}

function saveBestRecord(record) {
  if (record === null || record === undefined) return;
  localStorage.setItem(KEY_BEST, JSON.stringify(record));
}

function clearCurrentGame() {
  localStorage.removeItem(KEY_GAME);
}

function loadCurrentGame() {
  const raw = localStorage.getItem(KEY_GAME);
  if (raw === null) return null;
  try {
    return JSON.parse(raw);
  } catch {
    return null;
  }
}

function saveCurrentGame(state) {
  if (state === null || state === undefined) return;
  const payload = {
    size: state.size,
    score: state.score,
    elapsedMs: state.elapsedMs,
    startTime: state.startTime,
    nextTileId: state.nextTileId,
    tiles: Array.from(state.tiles.values()).map((tile) => ({
      id: tile.id,
      value: tile.value,
      cell: tile.cell,
    })),
  };
  localStorage.setItem(KEY_GAME, JSON.stringify(payload));
}



// src/game.js





const ANIM_MS = 120;

function createGame(renderer, onBestUpdate) {
  const state = createEmptyState();
  let bestRecord = null;
  let scoreListener = null;

  const updateBest = () => {
    if (!bestRecord) {
      bestRecord = { score: 0, durationMs: 0, timestamp: 0 };
    }
    if (state.score > bestRecord.score) {
      bestRecord = {
        score: state.score,
        durationMs: state.elapsedMs,
        timestamp: Date.now(),
      };
      if (onBestUpdate) onBestUpdate(bestRecord);
    }
  };

  const notifyScore = () => {
    if (scoreListener) scoreListener(state.score);
  };

  const renderAll = () => {
    renderer.render(state);
  };

  const pruneMergedOut = () => {
    const toRemove = [];
    state.tiles.forEach((tile) => {
      if (tile.isMergedOut) toRemove.push(tile.id);
    });
    toRemove.forEach((id) => state.tiles.delete(id));
  };

  const clearTransientState = () => {
    state.tiles.forEach((tile) => {
      tile.isNew = false;
      tile.mergedFrom = null;
    });
  };

  const initBoard = () => {
    state.boardCells.fill(null);
    state.tiles.clear();
    state.nextTileId = 1;
    state.score = 0;
    state.isGameOver = false;
    state.undoStack = [];
    resetTimer(state);
    addRandomTile(state);
    addRandomTile(state);
    state.tiles.forEach((tile) => {
      tile.isNew = false;
    });
    renderer.clearTransient();
    renderAll();
    notifyScore();
    saveCurrentGame(state);
  };

  const startNew = () => {
    cancelAnimation(state);
    initBoard();
  };

  const continueFrom = (saved) => {
    cancelAnimation(state);
    restoreFromSave(state, saved);
    pruneMergedOut();
    restoreTimer(state, state.elapsedMs);
    renderer.clearTransient();
    renderAll();
    notifyScore();
  };

  const handleMove = (dir) => {
    if (state.isAnimating || state.isGameOver) return;
    const snapshot = snapshotState(state);
    const result = moveTiles(state, dir);
    if (!result.moved) {
      restoreSnapshot(state, snapshot);
      return;
    }
    state.undoStack = [snapshot];
    updateElapsed(state);
    addRandomTile(state);
    state.isGameOver = !canMove(state);
    updateBest();
    saveCurrentGame(state);
    renderAll();
    notifyScore();
    runAnimation(state, ANIM_MS, () => {
      pruneMergedOut();
      clearTransientState();
      renderer.clearTransient();
      renderer.render(state);
      if (state.isGameOver) clearCurrentGame();
    });
  };

  const undo = () => {
    if (state.isAnimating) return;
    const snapshot = state.undoStack.pop();
    if (!snapshot) return;
    restoreSnapshot(state, snapshot);
    pruneMergedOut();
    restoreTimer(state, state.elapsedMs);
    saveCurrentGame(state);
    renderer.clearTransient();
    renderAll();
    notifyScore();
  };

  const restart = () => {
    startNew();
  };

  const clearSave = () => {
    clearCurrentGame();
  };

  const getBotState = () => ({
    size: state.size,
    cells: state.boardCells.map((id) => {
      if (id === null) return 0;
      const tile = state.tiles.get(id);
      return tile ? tile.value : 0;
    }),
    score: state.score,
    isAnimating: state.isAnimating,
    isGameOver: state.isGameOver,
  });

  return {
    state,
    startNew,
    continueFrom,
    handleMove,
    undo,
    restart,
    setBestRecord(record) {
      bestRecord = record;
    },
    getBestRecord() {
      return bestRecord;
    },
    setScoreListener(listener) {
      scoreListener = listener;
      notifyScore();
    },
    getBotState,
    clearSave,
  };
}



// src/input.js
const KEY_MAP = {
  ArrowUp: "up",
  ArrowDown: "down",
  ArrowLeft: "left",
  ArrowRight: "right",
  KeyW: "up",
  KeyS: "down",
  KeyA: "left",
  KeyD: "right",
};

function bindInput(targetEl, { onMove, onUndo }) {
  let touchStart = null;
  const threshold = 28;

  const handleKey = (event) => {
    if (event.repeat) return;
    if (event.code === "KeyZ" || event.code === "Backspace") {
      event.preventDefault();
      if (onUndo) onUndo();
      return;
    }
    const dir = KEY_MAP[event.code];
    if (!dir) return;
    event.preventDefault();
    onMove(dir);
  };

  const handleTouchStart = (event) => {
    if (event.touches.length !== 1) return;
    const touch = event.touches[0];
    touchStart = { x: touch.clientX, y: touch.clientY };
  };

  const handleTouchEnd = (event) => {
    if (!touchStart) return;
    const touch = event.changedTouches[0];
    const dx = touch.clientX - touchStart.x;
    const dy = touch.clientY - touchStart.y;
    touchStart = null;
    const absX = Math.abs(dx);
    const absY = Math.abs(dy);
    if (absX < threshold && absY < threshold) return;
    if (absX > absY) {
      onMove(dx > 0 ? "right" : "left");
    } else {
      onMove(dy > 0 ? "down" : "up");
    }
  };

  window.addEventListener("keydown", handleKey, { passive: false });
  targetEl.addEventListener("touchstart", handleTouchStart, { passive: true });
  targetEl.addEventListener("touchend", handleTouchEnd, { passive: true });

  return () => {
    window.removeEventListener("keydown", handleKey);
    targetEl.removeEventListener("touchstart", handleTouchStart);
    targetEl.removeEventListener("touchend", handleTouchEnd);
  };
}



// src/bot.js
const DIRS = ["up", "left", "right", "down"];
const DEFAULT_DELAY_MS = 180;
const MIN_DELAY_MS = 150;
const MAX_DELAY_MS = 360;
const DELAY_STEP_MS = 20;

function buildLines(size, dir) {
  const lines = [];
  if (dir === "left" || dir === "right") {
    for (let row = 0; row < size; row += 1) {
      const line = [];
      for (let col = 0; col < size; col += 1) {
        const actualCol = dir === "right" ? size - 1 - col : col;
        line.push(row * size + actualCol);
      }
      lines.push(line);
    }
  } else {
    for (let col = 0; col < size; col += 1) {
      const line = [];
      for (let row = 0; row < size; row += 1) {
        const actualRow = dir === "down" ? size - 1 - row : row;
        line.push(actualRow * size + col);
      }
      lines.push(line);
    }
  }
  return lines;
}

function simulateMove(snapshot, dir) {
  const size = snapshot.size;
  const nextCells = Array.from(snapshot.cells);
  let moved = false;
  let scoreGain = 0;

  buildLines(size, dir).forEach((line) => {
    const values = line.map((index) => nextCells[index]).filter((value) => value !== 0);
    const compacted = [];

    for (let i = 0; i < values.length; i += 1) {
      const value = values[i];
      if (i + 1 < values.length && values[i + 1] === value) {
        const merged = value * 2;
        compacted.push(merged);
        scoreGain += merged;
        i += 1;
      } else {
        compacted.push(value);
      }
    }

    for (let i = 0; i < line.length; i += 1) {
      const nextValue = compacted[i] || 0;
      const cellIndex = line[i];
      if (nextCells[cellIndex] !== nextValue) {
        moved = true;
      }
      nextCells[cellIndex] = nextValue;
    }
  });

  return { moved, cells: nextCells, scoreGain };
}

function cellsToBoard(cells, size) {
  const board = [];
  for (let row = 0; row < size; row += 1) {
    const start = row * size;
    board.push(cells.slice(start, start + size).map((value) => value || 0));
  }
  return board;
}

function inversePenalty(leftOrTop, rightOrBottom, weight) {
  if (leftOrTop === 0 && rightOrBottom === 0) return 0;
  if (leftOrTop >= rightOrBottom) return 0;
  const p = leftOrTop > 0 ? Math.log2(leftOrTop) : 0;
  const q = rightOrBottom > 0 ? Math.log2(rightOrBottom) : 0;
  const diff = q - p;
  return weight * diff * diff;
}

function coreOccupancyScore(board, topTiles) {
  const coreWeights = new Map([
    ["0,0", 2600],
    ["0,1", 1800],
    ["1,0", 1800],
    ["0,2", 1100],
    ["2,0", 1100],
  ]);

  const topSet = new Set(topTiles.slice(0, 5).map((t) => `${t.r},${t.c}`));
  let score = 0;

  for (const [key, weight] of coreWeights.entries()) {
    const [r, c] = key.split(",").map(Number);
    const value = board[r][c] || 0;

    if (topSet.has(key)) {
      score += weight * (value > 0 ? Math.log2(value) : 0);
    }

    if (value === 0) {
      score -= weight * 1.6;
    }

    if (value > 0 && value <= 8) {
      score -= weight * 0.8;
    }
  }

  return score;
}

function nearAnchorHighValueScore(topTiles) {
  let score = 0;
  for (let i = 1; i < Math.min(topTiles.length, 5); i += 1) {
    const tile = topTiles[i];
    const key = `${tile.r},${tile.c}`;
    const lv = Math.log2(tile.v);

    if (key === "0,1" || key === "1,0") {
      score += 2400 * lv;
    } else if (key === "0,2" || key === "2,0") {
      score += 1400 * lv;
    }
  }
  return score;
}

function analyzeStructure(board) {
  const flat = [];
  for (let r = 0; r < 4; r += 1) {
    for (let c = 0; c < 4; c += 1) {
      flat.push({ r, c, v: board[r][c] || 0 });
    }
  }

  const nonZero = flat.filter((x) => x.v > 0).sort((a, b) => b.v - a.v);
  const topTiles = nonZero.slice(0, 5);

  const coreSet = new Set(["0,0", "0,1", "0,2", "1,0", "2,0"]);
  const centerSet = new Set(["1,1", "1,2", "2,1", "2,2"]);

  const maxTile = nonZero[0] || { r: 0, c: 0, v: 0 };
  const maxDistToCorner = maxTile.r + maxTile.c;

  const a = board[0][0] || 0;
  const b = board[0][1] || 0;
  const c = board[0][2] || 0;
  const d = board[1][0] || 0;
  const e = board[2][0] || 0;

  const coreInverse =
    inversePenalty(a, b, 1) +
    inversePenalty(a, d, 1) +
    inversePenalty(b, c, 1) +
    inversePenalty(d, e, 1) +
    inversePenalty(b, d, 1) +
    inversePenalty(c, e, 1);

  let topInCore = 0;
  let topInCenter = 0;
  let largeActiveBackToCore = 0;

  for (const t of topTiles) {
    const key = `${t.r},${t.c}`;
    if (coreSet.has(key)) topInCore += 1;
    if (centerSet.has(key)) topInCenter += 1;
    if (coreSet.has(key) && !(t.r === 0 && t.c === 0)) {
      largeActiveBackToCore += 1;
    }
  }

  return {
    maxDistToCorner,
    coreInverse,
    topInCore,
    topInCenter,
    largeActiveBackToCore,
  };
}

function evaluateBoard(board, prevBoard = null) {
  const flat = [];
  for (let r = 0; r < 4; r += 1) {
    for (let c = 0; c < 4; c += 1) {
      flat.push({ r, c, v: board[r][c] || 0 });
    }
  }

  const nonZero = flat.filter((x) => x.v > 0).sort((a, b) => b.v - a.v);
  const topTiles = nonZero.slice(0, 6);
  const maxTile = topTiles[0] || { r: 0, c: 0, v: 0 };

  const coreSet = new Set(["0,0", "0,1", "0,2", "1,0", "2,0"]);
  const centerSet = new Set(["1,1", "1,2", "2,1", "2,2"]);

  let score = 0;

  // 1) 最大数守角
  if (maxTile.r === 0 && maxTile.c === 0) {
    score += 5000;
  } else {
    const dist = maxTile.r + maxTile.c;
    score -= 4000 + dist * 1800;
  }

  // 2) 核心 5 格单调
  const a = board[0][0] || 0;
  const b = board[0][1] || 0;
  const c = board[0][2] || 0;
  const d = board[1][0] || 0;
  const e = board[2][0] || 0;

  score -= inversePenalty(a, b, 2600);
  score -= inversePenalty(a, d, 2600);
  score -= inversePenalty(b, c, 1600);
  score -= inversePenalty(d, e, 1600);
  score -= inversePenalty(b, d, 1200);
  score -= inversePenalty(c, e, 900);

  // 3) 核心 5 格占位质量
  score += coreOccupancyScore(board, topTiles);

  // 4) 中心禁区
  for (let i = 0; i < Math.min(topTiles.length, 5); i += 1) {
    const t = topTiles[i];
    const key = `${t.r},${t.c}`;
    if (centerSet.has(key)) {
      score -= 3200 * Math.log2(t.v);
    }
  }

  // 5) 大数贴近锚角边
  score += nearAnchorHighValueScore(topTiles);

  // 6) 活动空间
  const emptyCount = flat.filter((x) => x.v === 0).length;
  score += emptyCount * 120;

  // 7) 恢复趋势
  if (prevBoard) {
    const prevState = analyzeStructure(prevBoard);
    const currState = analyzeStructure(board);
    score += (prevState.coreInverse - currState.coreInverse) * 3200;
    score += (currState.topInCore - prevState.topInCore) * 2600;
    score +=
      (currState.largeActiveBackToCore - prevState.largeActiveBackToCore) * 2200;
    score += (prevState.topInCenter - currState.topInCenter) * 2600;
    score += (prevState.maxDistToCorner - currState.maxDistToCorner) * 2200;
  }

  return score;
}

function chooseBotMove(snapshot) {
  if (!snapshot || snapshot.isGameOver) return null;

  let best = null;
  const prevBoard = cellsToBoard(snapshot.cells, snapshot.size);
  DIRS.forEach((dir, index) => {
    const result = simulateMove(snapshot, dir);
    if (!result.moved) return;
    const nextBoard = cellsToBoard(result.cells, snapshot.size);
    const score = evaluateBoard(nextBoard, prevBoard) - index * 0.001;
    if (!best || score > best.score) {
      best = { dir, score };
    }
  });

  return best ? best.dir : null;
}

function createStrategyBot({
  getState,
  requestMove,
  onChange,
  delayMs = DEFAULT_DELAY_MS,
}) {
  let running = false;
  let timerId = null;
  let currentDelayMs = Math.max(MIN_DELAY_MS, Math.min(MAX_DELAY_MS, delayMs));

  const emitChange = () => {
    if (onChange) {
      onChange({
        running,
        delayMs: currentDelayMs,
        minDelayMs: MIN_DELAY_MS,
        maxDelayMs: MAX_DELAY_MS,
      });
    }
  };

  const clearTimer = () => {
    if (timerId !== null) {
      clearTimeout(timerId);
      timerId = null;
    }
  };

  const schedule = () => {
    clearTimer();
    if (!running) return;
    timerId = window.setTimeout(tick, currentDelayMs);
  };

  const stop = () => {
    if (!running && timerId === null) return;
    running = false;
    clearTimer();
    emitChange();
  };

  const tick = () => {
    timerId = null;
    if (!running) return;
    const snapshot = getState();
    if (!snapshot || snapshot.isGameOver) {
      stop();
      return;
    }
    if (snapshot.isAnimating) {
      schedule();
      return;
    }
    const dir = chooseBotMove(snapshot);
    if (!dir) {
      stop();
      return;
    }
    requestMove(dir);
    schedule();
  };

  const start = () => {
    if (running) return;
    running = true;
    emitChange();
    schedule();
  };

  const toggle = () => {
    if (running) {
      stop();
    } else {
      start();
    }
  };

  return {
    start,
    stop,
    toggle,
    setDelay(nextDelayMs) {
      const normalized = Math.max(MIN_DELAY_MS, Math.min(MAX_DELAY_MS, nextDelayMs));
      if (normalized === currentDelayMs) return currentDelayMs;
      currentDelayMs = normalized;
      emitChange();
      if (running) schedule();
      return currentDelayMs;
    },
    adjustDelay(deltaMs) {
      return this.setDelay(currentDelayMs + deltaMs);
    },
    getDelay() {
      return currentDelayMs;
    },
    getDelayConfig() {
      return {
        minDelayMs: MIN_DELAY_MS,
        maxDelayMs: MAX_DELAY_MS,
        stepMs: DELAY_STEP_MS,
      };
    },
    isRunning() {
      return running;
    },
  };
}

const entryEl = document.getElementById("entry");
const gameEl = document.getElementById("game");
const boardEl = document.getElementById("board");
const overlayEl = document.getElementById("game-over");

const btnStart = document.getElementById("btn-start");
const btnContinue = document.getElementById("btn-continue");
const btnBot = document.getElementById("btn-bot");
const btnBotSlower = document.getElementById("btn-bot-slower");
const btnBotFaster = document.getElementById("btn-bot-faster");
const btnUndo = document.getElementById("btn-undo");
const btnRestart = document.getElementById("btn-restart");
const btnBack = document.getElementById("btn-back");
const btnOverRestart = document.getElementById("btn-over-restart");
const btnOverBoard = document.getElementById("btn-over-board");

const scoreEl = document.getElementById("score");
const bestScoreEl = document.getElementById("best-score");
const recordScoreEl = document.getElementById("record-score");
const recordTimeEl = document.getElementById("record-time");
const recordDateEl = document.getElementById("record-date");
const botSpeedEl = document.getElementById("bot-speed");

const renderer = createRenderer(boardEl, overlayEl);
let gameOverOverlayDismissed = false;

const renderGameView = () => {
  renderer.render(game.state);
  if (game.state.isGameOver && gameOverOverlayDismissed) {
    renderer.showGameOver(false);
  }
};

const updateEntryRecord = (record) => {
  if (!record || record.score === 0) {
    recordScoreEl.textContent = "--";
    recordTimeEl.textContent = "--";
    recordDateEl.textContent = "--";
    return;
  }
  recordScoreEl.textContent = record.score;
  recordTimeEl.textContent = formatDuration(record.durationMs);
  recordDateEl.textContent = new Date(record.timestamp).toLocaleString();
};

const updateBestScore = (record) => {
  bestScoreEl.textContent = record ? record.score : 0;
  updateEntryRecord(record);
  if (record) saveBestRecord(record);
};

const game = createGame(renderer, updateBestScore);
game.setScoreListener((score) => {
  scoreEl.textContent = score;
});

const updateBotUi = ({ running, delayMs, minDelayMs, maxDelayMs }) => {
  if (!btnBot) return;
  btnBot.textContent = running ? "停止托管" : "托管";
  btnBot.classList.toggle("active", running);
  if (botSpeedEl) {
    botSpeedEl.textContent = `${delayMs}ms`;
  }
  if (btnBotFaster) {
    btnBotFaster.disabled = delayMs <= minDelayMs;
  }
  if (btnBotSlower) {
    btnBotSlower.disabled = delayMs >= maxDelayMs;
  }
};

const bot = createStrategyBot({
  getState: () => game.getBotState(),
  requestMove: (dir) => game.handleMove(dir),
  onChange: updateBotUi,
  delayMs: 180,
});

const stopBot = () => {
  bot.stop();
};

const handlePlayerMove = (dir) => {
  stopBot();
  game.handleMove(dir);
};

const handleUndo = () => {
  stopBot();
  gameOverOverlayDismissed = false;
  game.undo();
};

const refreshContinue = () => {
  const current = loadCurrentGame();
  btnContinue.disabled = current === null;
};

const showEntry = () => {
  stopBot();
  gameOverOverlayDismissed = false;
  entryEl.classList.remove("hidden");
  gameEl.classList.add("hidden");
  renderer.showGameOver(false);
  refreshContinue();
};

const showGame = () => {
  entryEl.classList.add("hidden");
  gameEl.classList.remove("hidden");
  renderer.measure();
  renderGameView();
};

const bestRecord = loadBestRecord() || { score: 0, durationMs: 0, timestamp: 0 };
updateBestScore(bestRecord);
game.setBestRecord(bestRecord);

refreshContinue();

btnStart.addEventListener("click", () => {
  stopBot();
  gameOverOverlayDismissed = false;
  clearCurrentGame();
  game.startNew();
  showGame();
});

btnContinue.addEventListener("click", () => {
  stopBot();
  gameOverOverlayDismissed = false;
  const current = loadCurrentGame();
  if (!current) return;
  game.continueFrom(current);
  showGame();
});

if (btnBot) {
  btnBot.addEventListener("click", () => {
    if (game.state.isGameOver) return;
    bot.toggle();
  });
}
if (btnBotSlower) {
  btnBotSlower.addEventListener("click", () => {
    bot.adjustDelay(DELAY_STEP_MS);
  });
}
if (btnBotFaster) {
  btnBotFaster.addEventListener("click", () => {
    bot.adjustDelay(-DELAY_STEP_MS);
  });
}

btnUndo.addEventListener("click", handleUndo);
btnRestart.addEventListener("click", () => {
  stopBot();
  gameOverOverlayDismissed = false;
  game.restart();
});
btnBack.addEventListener("click", () => {
  showEntry();
});
btnOverRestart.addEventListener("click", () => {
  stopBot();
  gameOverOverlayDismissed = false;
  game.restart();
});
btnOverBoard.addEventListener("click", () => {
  gameOverOverlayDismissed = true;
  renderer.showGameOver(false);
});

bindInput(boardEl, {
  onMove: handlePlayerMove,
  onUndo: handleUndo,
});

window.addEventListener("resize", () => {
  renderer.measure();
  renderGameView();
});

updateBotUi({
  running: false,
  delayMs: bot.getDelay(),
  ...bot.getDelayConfig(),
});


})();
